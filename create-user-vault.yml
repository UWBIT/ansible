- name: Configure SSL key, create user, generate SSH key, and add NOPASSWD to sudoers
  hosts: new
  become: yes

  pre_tasks:
    - name: Ensure vault user file was provided
      ansible.builtin.assert:
        that:
          - vault_user_file | trim | length > 0
        fail_msg: "Provide a vault file path with -e vault_user_file=... (for example vault/users/kevin.vault.yml)."

    - name: Load vaulted user inputs
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/{{ vault_user_file }}"
      no_log: true
      ignore_errors: false

  vars:
    vault_user_file: ""
    # Inputs come only from the provided vault file
    new_username: "{{ vault_create_user_name | default('', true) | trim }}"
    ssh_key_type: "ed25519"
    rsa_ssh_key_bits: 3072
    ssh_key_comment: "admin@{{ ansible_hostname }}"
    ssh_key_dest: "/home/{{ new_username }}/.ssh/id_{{ ssh_key_type }}"
    ssh_keys: "{{ vault_create_user_ssh_keys | default([], true) }}"

  tasks:
    - name: Ensure required vault values were provided
      ansible.builtin.assert:
        that:
          - new_username | length > 0
          - ssh_keys | length > 0
        fail_msg: "Vault values are required in the provided vault file: vault_create_user_name and vault_create_user_ssh_keys."

    - name: Create user
      ansible.builtin.user:
        name: "{{ new_username }}"
        state: present
        shell: /bin/bash

    - name: Add new user to sudo group
      ansible.builtin.user:
        name: "{{ new_username }}"
        groups: sudo
        append: yes

    - name: Create .ssh directory
      ansible.builtin.file:
        path: "/home/{{ new_username }}/.ssh/"
        state: directory
        owner: "{{ new_username }}"
        group: "{{ new_username }}"

    - name: Generate SSH key for new user
      community.crypto.openssh_keypair:
        path: "{{ ssh_key_dest }}"
        type: "{{ ssh_key_type }}"
        size: "{{ rsa_ssh_key_bits if ssh_key_type == 'rsa' else omit }}"
        comment: "{{ ssh_key_comment }}"
        owner: "{{ new_username }}"

    - name: Add multiple SSH keys to authorized_keys
      ansible.builtin.authorized_key:
        user: "{{ new_username }}"
        state: present
        key: "{{ lookup('file', item) }}"
      loop: "{{ ssh_keys }}"

    - name: Add NOPASSWD to sudoers for new user
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        line: "{{ new_username }} ALL=(ALL) NOPASSWD: ALL"
        validate: '/usr/sbin/visudo -cf %s'
