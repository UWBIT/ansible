---
- name: Final assembly of a new Rocky 9 server before customization
  hosts: new
  become: yes
  vars:
    username: "infra"
    ssh_keys:
      - files/certs/nic.pub
      - files/certs/nicremote.pub
      - files/certs/brian.pub

  tasks:
    - name: Update package metadata and upgrade installed packages
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: yes

    - name: Install SELinux Python bindings required by Ansible modules
      ansible.builtin.dnf:
        name:
          - python3-libselinux
        state: present

    - name: Add multiple SSH keys to authorized_keys
      ansible.builtin.authorized_key:
        user: "{{ username }}"
        state: present
        key: "{{ lookup('file', item) }}"
      loop: "{{ ssh_keys }}"

    - name: Install pre-requisite packages
      ansible.builtin.dnf:
        name:
          - wget
          - qemu-guest-agent
          - git
        state: present

    - name: Enable and start qemu-guest-agent
      ansible.builtin.systemd:
        name: qemu-guest-agent
        state: started
        enabled: true

  handlers:
    - name: restart sshd service
      ansible.builtin.service:
        name: sshd
        state: restarted