- name: Configure automated updates (Ubuntu and Debian)
  hosts: ubuntu:debian
  become: true
  gather_facts: true
  vars_files:
    - var/main.yml
  tasks:

## https://help.ubuntu.com/community/AutomaticSecurityUpdates

    - name: Install unattended-upgrades package
      ansible.builtin.apt:
        name: unattended-upgrades
        state: present

    - name: Install Ubuntu reboot notifier package
      ansible.builtin.apt:
        name: update-notifier-common
        state: present
      when: ansible_distribution == "Ubuntu"

    - name: Create unattended upgrades configuration file
      ansible.builtin.blockinfile:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        block: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
        marker: "// {mark} ANSIBLE MANAGED BLOCK - unattended_upgrades settings"
        create: true
        mode: "0644"
        owner: root
        group: root
      register: unattended_upgrades_config_set

    - name: Enable automated reboots
      ansible.builtin.blockinfile:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        block: |
          Unattended-Upgrade::Automatic-Reboot "true";
          Unattended-Upgrade::Automatic-Reboot-Time "{{ reboot_time | trim }}";
        marker: "// {mark} ANSIBLE MANAGED BLOCK - unattended_upgrades settings"
        create: true
        mode: "0644"
        owner: root
        group: root
      register: unattended_upgrades_settings_set

    - name: Dpkg reconfigure
      ansible.builtin.command:
        cmd: dpkg-reconfigure -f noninteractive unattended-upgrades
      register: dpkg_reconfigure_unattended_upgrades
      when:
        - unattended_upgrades_config_set.changed or
          unattended_upgrades_settings_set.changed

    - name: Create systemd drop-in directory for apt-daily-upgrade timer
      ansible.builtin.file:
        path: /etc/systemd/system/apt-daily-upgrade.timer.d
        state: directory
        mode: "0755"

    - name: Configure updates installation timing
      ansible.builtin.copy:
        dest: /etc/systemd/system/apt-daily-upgrade.timer.d/override.conf
        content: |
          [Timer]
          OnCalendar=
          OnCalendar=*-*-* {{ install_time | trim }}
          RandomizedDelaySec={{ reboot_offset }}
          Persistent=true
        owner: root
        group: root
        mode: "0644"
      register: apt_daily_upgrade_timer_override

    - name: Reload systemd and restart apt-daily-upgrade timer
      ansible.builtin.systemd:
        daemon_reload: true
        name: apt-daily-upgrade.timer
        enabled: true
        state: restarted
      when: apt_daily_upgrade_timer_override.changed

    - name: Ensure apt-daily-upgrade timer is enabled and running
      ansible.builtin.systemd:
        name: apt-daily-upgrade.timer
        enabled: true
        state: started
